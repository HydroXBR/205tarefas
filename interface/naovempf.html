<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Não Vem PF! - MedTasks</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/png" href="https://i.ibb.co/nqmZ9nGr/Logo-IG-Med-Ufam116-3x.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .pf-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .pf-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .pf-header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--primary-green-dark) 100%);
            padding: 1.5rem;
            text-align: center;
        }

        .pf-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .pf-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .pf-body {
            padding: 1.5rem;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .mode-btn:hover {
            border-color: var(--primary-green);
            color: var(--text-primary);
        }

        .mode-btn.active {
            border-color: var(--primary-green);
            background: rgba(105, 120, 37, 0.1);
            color: var(--primary-green);
        }

        .mode-btn i {
            margin-right: 6px;
        }

        /* Form */
        .form-group {
            margin-bottom: 0.75rem;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-control {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: border-color 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(105, 120, 37, 0.2);
        }

        .form-control::placeholder {
            color: var(--text-tertiary);
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: var(--primary-green);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-green-light);
            transform: scale(1.02);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-danger {
            background: #dc2626;
            color: #fff;
        }

        .btn-danger:hover {
            background: #ef4444;
            transform: scale(1.02);
        }

        .btn-block {
            width: 100%;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
        }

        .add-note-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
        }

        .add-note-btn:hover {
            border-color: var(--primary-green);
            color: var(--primary-green);
        }

        .remove-note {
            display: none;
        }

        .note-entry .remove-note {
            display: block;
        }

        .note-entry:only-of-type .remove-note {
            display: none;
        }

        /* Botão "Falta uma prova?" */
        .falta-prova-btn {
            padding: 0.75rem 1rem;
            background: rgba(105, 120, 37, 0.08);
            border: 2px dashed var(--primary-green);
            border-radius: 12px;
            color: var(--primary-green);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            margin-top: 0.5rem;
        }

        .falta-prova-btn:hover {
            background: rgba(105, 120, 37, 0.15);
            border-color: var(--primary-green-light);
            transform: scale(1.01);
        }

        /* Painel do Simulador de Próxima Prova */
        .simulador-painel {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-elevated);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            animation: slideIn 0.3s ease;
        }

        .simulador-painel.show {
            display: block;
        }

        .simulador-painel label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .simulador-painel .form-row {
            align-items: flex-end;
        }

        .simulador-resultado {
            margin-top: 0.75rem;
            font-size: 0.9rem;
        }

        /* Result */
        .result-card {
            display: none;
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            margin-top: 1.5rem;
            border: 2px solid;
            animation: slideIn 0.5s ease;
        }

        .result-card.show {
            display: block;
        }

        .result-card.pass {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .result-card.fail {
            border-color: #dc2626;
            background: rgba(220, 38, 38, 0.05);
        }

        .result-card .result-image {
            max-width: 200px;
            margin: 0 auto 1rem auto;
            border-radius: 12px;
            display: block;
        }

        .result-card .result-title {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .result-card.pass .result-title {
            color: #10b981;
        }

        .result-card.fail .result-title {
            color: #dc2626;
        }

        .result-card .result-details {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .result-card .result-details strong {
            color: var(--text-primary);
        }

        .result-card .result-details .highlight-pass {
            color: #10b981;
            font-weight: 700;
        }

        .result-card .result-details .highlight-fail {
            color: #dc2626;
            font-weight: 700;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .pf-container {
                padding: 1rem;
            }
            .pf-body {
                padding: 1rem;
            }
            .form-row {
                flex-direction: column;
                gap: 0.5rem;
            }
            .mode-selector {
                flex-direction: column;
            }
            .result-card .result-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR PADRÃO MEDTASKS -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://i.ibb.co/5XVmGm7h/marca-ufam-vetor-positivo.png" alt="UFAM Logo" class="ufam-logo">
                <div class="turma-logo-container">
                    <img src="https://i.ibb.co/nqmZ9nGr/Logo-IG-Med-Ufam116-3x.png" alt="Turma 116" class="turma-logo">
                </div>
                <div class="logo-text">
                    <span class="med-text">Med</span><span class="tasks-text">Tasks</span>
                    <span class="turma-badge">MED UFAM 116</span>
                </div>
            </div>
            <div class="menu-icon" id="menuIcon">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="/"><i class="fas fa-home"></i> Início</a>
                <a href="/horarios"><i class="fas fa-calendar-alt"></i> Horários</a>
                <a href="/calendar"><i class="fas fa-calendar-week"></i> Calendário</a>
                <a href="/ppc"><i class="fas fa-book-open"></i> PPC</a>
                <a href="/sobre"><i class="fas fa-info-circle"></i> Sobre</a>
                <a href="/add" class="btn-add"><i class="fas fa-plus"></i> Adicionar Tarefa</a>
                <a href="/addlembrete" class="btn-add" style="background: #3b82f6;"><i class="fas fa-bell"></i> Adicionar Lembrete</a>
            </div>
        </div>
    </nav>

    <div class="pf-container">
        <div class="pf-card">
            <div class="pf-header">
                <h1><i class="fas fa-calculator"></i> Não Vem PF!</h1>
                <p>Descubra se você precisa fazer a Prova Final</p>
            </div>
            <div class="pf-body">
                <!-- Mode Selector -->
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="complete" onclick="switchMode('complete')">
                        <i class="fas fa-calculator"></i> Cálculo Completo
                    </button>
                    <button class="mode-btn" data-mode="average" onclick="switchMode('average')">
                        <i class="fas fa-chart-line"></i> Pela Média dos Exercícios
                    </button>
                </div>

                <!-- Modo Completo -->
                <div id="completeMode">
                    <div class="form-group" style="margin-bottom:1rem;">
                        <label><i class="fas fa-info-circle"></i> Insira suas notas e pesos dos exercícios</label>
                    </div>
                    <div id="notesContainer">
                        <div class="form-row note-entry">
                            <div class="form-group">
                                <label>Nota</label>
                                <input type="number" class="form-control nota-input" step="0.1" min="0" max="10" placeholder="0-10">
                            </div>
                            <div class="form-group">
                                <label>Peso</label>
                                <input type="number" class="form-control peso-input" step="0.1" min="0" max="10" placeholder="Peso" value="1">
                            </div>
                            <div class="form-group" style="flex:0 0 40px; display:flex; align-items:flex-end;">
                                <button class="btn btn-danger btn-sm remove-note" onclick="removeNote(this)">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <button class="add-note-btn" onclick="addNote()">
                        <i class="fas fa-plus"></i> Adicionar outra nota
                    </button>
                    
                    <!-- Botão "Falta uma prova?" -->
                    <button class="falta-prova-btn" onclick="toggleSimulador()">
                        <i class="fas fa-question-circle"></i> Falta uma prova? Adicione só o peso e saiba quanto você precisa tirar nela
                    </button>
                    
                    <!-- Painel do Simulador de Próxima Prova -->
                    <div class="simulador-painel" id="simuladorPainel">
                        <label><i class="fas fa-bullseye"></i> Qual o peso da prova que falta?</label>
                        <div class="form-row">
                            <div class="form-group" style="flex:1;">
                                <input type="number" id="pesoProvaFaltante" class="form-control" step="0.1" min="0.1" max="10" placeholder="Ex: 2" value="1">
                            </div>
                            <button class="btn btn-primary" onclick="calcularNotaFaltante()">
                                <i class="fas fa-calculator"></i> Calcular
                            </button>
                        </div>
                        <div id="resultadoNotaFaltante" class="simulador-resultado"></div>
                    </div>
                    
                    <div style="margin-top:0.75rem;">
                        <button class="btn btn-primary btn-block" onclick="calculateComplete()">
                            <i class="fas fa-calculator"></i> Calcular
                        </button>
                    </div>
                </div>

                <!-- Modo Média dos Exercícios -->
                <div id="averageMode" style="display:none;">
                    <div class="form-group">
                        <label>Média dos Exercícios (média ponderada das suas notas)</label>
                        <input type="number" id="mediaExercicios" class="form-control" step="0.1" min="0" max="10" placeholder="0-10">
                    </div>
                    
                    <!-- Botão "Falta uma prova?" para modo média -->
                    <button class="falta-prova-btn" onclick="toggleSimuladorMedia()">
                        <i class="fas fa-question-circle"></i> Falta uma prova? Adicione só o peso e saiba quanto você precisa tirar nela
                    </button>
                    
                    <!-- Painel do Simulador para modo média -->
                    <div class="simulador-painel" id="simuladorPainelMedia">
                        <label><i class="fas fa-bullseye"></i> Qual o peso da prova que falta?</label>
                        <div class="form-row">
                            <div class="form-group" style="flex:1;">
                                <input type="number" id="pesoProvaFaltanteMedia" class="form-control" step="0.1" min="0.1" max="10" placeholder="Ex: 2" value="1">
                            </div>
                            <button class="btn btn-primary" onclick="calcularNotaFaltanteMedia()">
                                <i class="fas fa-calculator"></i> Calcular
                            </button>
                        </div>
                        <div id="resultadoNotaFaltanteMedia" class="simulador-resultado"></div>
                    </div>
                    
                    <button class="btn btn-primary btn-block" onclick="calculateAverage()" style="margin-top:0.75rem;">
                        <i class="fas fa-calculator"></i> Calcular
                    </button>
                </div>

                <!-- Resultado -->
                <div class="result-card" id="resultCard">
                    <img class="result-image" id="resultImage" src="" alt="" style="display:none;">
                    <div class="result-title" id="resultTitle">Resultado</div>
                    <div class="result-details" id="resultDetails"></div>
                </div>

                <!-- Reset -->
                <div style="text-align: center; margin-top: 1rem;">
                    <button class="btn btn-secondary btn-sm" onclick="resetAll()">
                        <i class="fas fa-redo"></i> Limpar tudo
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p><i class="far fa-copyright"></i> 2026 MedTasks - MED UFAM 116 - Faculdade de Medicina UFAM</p>
        </div>
    </footer>

    <script>
        // ===== NAVBAR MOBILE =====
        document.getElementById('menuIcon').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // ===== ÁUDIO =====
        let audioSuspense = null;
        let audioFah = null;
        let audioTriste = null;
        let audioFeliz = null;

        function preloadAudios() {
            audioSuspense = new Audio('/src/suspense.mp3');
            audioSuspense.loop = true;
            audioSuspense.volume = 0.3;
            
            audioFah = new Audio('/src/fah.mp3');
            audioFah.volume = 0.5;
            
            audioTriste = new Audio('/src/mtriste.mp3');
            audioTriste.volume = 0.7;
            
            audioFeliz = new Audio('/src/mfeliz.mp3');
            audioFeliz.volume = 0.7;
        }

        function playSuspense() {
            if (audioSuspense) {
                audioSuspense.currentTime = 0;
                audioSuspense.play().catch(() => {});
            }
        }

        function stopSuspense() {
            if (audioSuspense) {
                audioSuspense.pause();
                audioSuspense.currentTime = 0;
            }
        }

        function playFah() {
            if (audioFah) {
                audioFah.currentTime = 0;
                audioFah.play().catch(() => {});
            }
        }

        function playTriste() {
            if (audioTriste) {
                audioTriste.currentTime = 0;
                audioTriste.play().catch(() => {});
            }
        }

        function playFeliz() {
            if (audioFeliz) {
                audioFeliz.currentTime = 0;
                audioFeliz.play().catch(() => {});
            }
        }

        // ===== MODOS =====
        let currentMode = 'complete';
        let noteCount = 1;

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');
            
            document.getElementById('completeMode').style.display = mode === 'complete' ? 'block' : 'none';
            document.getElementById('averageMode').style.display = mode === 'average' ? 'block' : 'none';
            
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('resultadoNotaFaltante').textContent = '';
            document.getElementById('resultadoNotaFaltanteMedia').textContent = '';
            document.getElementById('simuladorPainel').classList.remove('show');
            document.getElementById('simuladorPainelMedia').classList.remove('show');
        }

        // ===== NOTAS =====
        function addNote() {
            noteCount++;
            const container = document.getElementById('notesContainer');
            const newEntry = document.createElement('div');
            newEntry.className = 'form-row note-entry';
            newEntry.innerHTML = `
                <div class="form-group">
                    <label>Nota ${noteCount}</label>
                    <input type="number" class="form-control nota-input" step="0.1" min="0" max="10" placeholder="0-10">
                </div>
                <div class="form-group">
                    <label>Peso</label>
                    <input type="number" class="form-control peso-input" step="0.1" min="0" max="10" placeholder="Peso" value="1">
                </div>
                <div class="form-group" style="flex:0 0 40px; display:flex; align-items:flex-end;">
                    <button class="btn btn-danger btn-sm remove-note" onclick="removeNote(this)">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            container.appendChild(newEntry);
        }

        function removeNote(btn) {
            const entry = btn.closest('.note-entry');
            if (document.querySelectorAll('.note-entry').length > 1) {
                entry.remove();
                noteCount--;
                const labels = document.querySelectorAll('.note-entry .form-group:first-child label');
                labels.forEach((label, i) => {
                    label.textContent = `Nota ${i + 1}`;
                });
            }
        }

        // ===== TOGGLE SIMULADOR =====
        function toggleSimulador() {
            const painel = document.getElementById('simuladorPainel');
            painel.classList.toggle('show');
            document.getElementById('resultadoNotaFaltante').textContent = '';
        }

        function toggleSimuladorMedia() {
            const painel = document.getElementById('simuladorPainelMedia');
            painel.classList.toggle('show');
            document.getElementById('resultadoNotaFaltanteMedia').textContent = '';
        }

        // ===== CÁLCULOS =====
        function getMediaExercicios() {
            const notas = document.querySelectorAll('.nota-input');
            const pesos = document.querySelectorAll('.peso-input');
            let somaPonderada = 0;
            let somaPesos = 0;
            let temNota = false;
            
            notas.forEach((n, i) => {
                const nota = parseFloat(n.value);
                const peso = parseFloat(pesos[i].value);
                if (!isNaN(nota) && !isNaN(peso) && peso > 0) {
                    somaPonderada += nota * peso;
                    somaPesos += peso;
                    temNota = true;
                }
            });
            
            if (!temNota || somaPesos === 0) return null;
            return { media: somaPonderada / somaPesos, somaPesos: somaPesos };
        }

        function exibirResultado(mediaExercicios) {
            stopSuspense();
            playFah();

            const card = document.getElementById('resultCard');
            const title = document.getElementById('resultTitle');
            const details = document.getElementById('resultDetails');
            const img = document.getElementById('resultImage');

            const pass = mediaExercicios >= 7.5;
            const pfNecessaria = Math.max(0, 15 - (mediaExercicios * 2));
            const pfArredondada = Math.ceil(pfNecessaria * 10) / 10;
            
            // Cálculo da Média Final (após PF)
            let mediaFinal = 0;
            if (!pass) {
                mediaFinal = ((mediaExercicios * 2) + pfArredondada) / 3;
            }

            // Mostrar a imagem primeiro, centralizada
            img.style.display = 'block';
            
            if (pass) {
                const saldo = mediaExercicios - 7.5;
                title.textContent = 'PASSOU! 🎉';
                card.className = 'result-card show pass';
                img.src = '/src/mtriste.png';
                playFeliz();

                details.innerHTML = `
                    <p>Você <span class="highlight-pass">PASSOU</span> sem precisar da Prova Final!</p>
                    <div style="margin-top:0.5rem; padding:0.75rem; background:rgba(16,185,129,0.1); border-radius:10px;">
                        <span class="highlight-pass">✨ Você passou com saldo de ${saldo.toFixed(2)} pontos!</span>
                        <br><br>
                        <strong>Média dos Exercícios: ${mediaExercicios.toFixed(2)}</strong>
                        <br>
                        <span style="font-size:0.85rem;">Nota necessária para passar: <strong>7.5</strong></span>
                        <br>
                        <span style="font-size:0.85rem; color:var(--text-tertiary);">Você está ${saldo.toFixed(2)} pontos acima do necessário ✅</span>
                    </div>
                    <p style="margin-top:0.75rem; font-size:0.85rem; color:var(--text-tertiary);">
                        <i class="fas fa-info-circle"></i> Para passar direto, a Média dos Exercícios deve ser ≥ 7.5
                    </p>
                `;
            } else {
                const diferenca = 7.5 - mediaExercicios;
                title.textContent = 'NÃO PASSOU!';
                card.className = 'result-card show fail';
                img.src = '/src/mfeliz.png';
                playTriste();

                details.innerHTML = `
                    <p>Você <span class="highlight-fail">NÃO PASSOU</span> e precisa fazer a Prova Final</p>
                    <div style="margin-top:0.5rem; padding:0.75rem; background:rgba(220,38,38,0.1); border-radius:10px;">
                        <span class="highlight-fail">📉 Faltam ${diferenca.toFixed(2)} pontos na Média dos Exercícios para atingir 7.5</span>
                        <br><br>
                        <strong>Média dos Exercícios: ${mediaExercicios.toFixed(2)}</strong>
                        <br>
                        <span style="font-size:0.85rem;">Nota necessária para passar direto: <strong>7.5</strong></span>
                    </div>
                    <div style="margin-top:0.75rem; padding:0.75rem; background:rgba(220,38,38,0.05); border-radius:10px; border:1px solid rgba(220,38,38,0.2);">
                        <strong style="font-size:1.1rem;">📝 Você precisa tirar ${pfArredondada.toFixed(1)} na Prova Final</strong>
                        <br><br>
                        <span style="font-size:0.85rem; color:var(--text-tertiary);">
                            Cálculo da nota necessária na PF:
                            <br>
                            PF necessária = (5 × 3) − (2 × ${mediaExercicios.toFixed(2)}) = ${pfNecessaria.toFixed(2)}
                            <br>
                            Arredondando para cima: <strong>${pfArredondada.toFixed(1)}</strong>
                        </span>
                        <br><br>
                        <span style="font-size:0.85rem; color:var(--text-primary);">
                            <strong>Sua Média Final será: (${mediaExercicios.toFixed(2)} × 2 + ${pfArredondada.toFixed(1)}) ÷ 3 = ${mediaFinal.toFixed(2)}</strong>
                            ${mediaFinal >= 5 ? '<span style="color:#10b981;"> ✅ Passou!</span>' : '<span style="color:#dc2626;"> ❌ Não passou</span>'}
                        </span>
                    </div>
                    <p style="margin-top:0.75rem; font-size:0.85rem; color:var(--text-tertiary);">
                        <i class="fas fa-info-circle"></i> Média Final = (Média dos Exercícios × 2 + PF) ÷ 3 ≥ 5
                    </p>
                `;
            }
        }

        function calculateComplete() {
            const result = getMediaExercicios();
            if (!result) {
                alert('Adicione pelo menos uma nota válida!');
                return;
            }
            exibirResultado(result.media);
        }

        function calculateAverage() {
            const mediaExercicios = parseFloat(document.getElementById('mediaExercicios').value);
            if (isNaN(mediaExercicios) || mediaExercicios < 0 || mediaExercicios > 10) {
                alert('Digite uma Média dos Exercícios válida (0-10)!');
                return;
            }
            exibirResultado(mediaExercicios);
        }

        // ===== CALCULAR NOTA FALTANTE =====
        function calcularNotaFaltante() {
            const peso = parseFloat(document.getElementById('pesoProvaFaltante').value);
            const resultado = document.getElementById('resultadoNotaFaltante');

            if (isNaN(peso) || peso <= 0) {
                resultado.innerHTML = '<span style="color:#dc2626;">⚠️ Digite um peso válido maior que zero!</span>';
                return;
            }

            const dados = getMediaExercicios();
            if (!dados) {
                resultado.innerHTML = '<span style="color:#dc2626;">⚠️ Adicione pelo menos uma nota com peso antes de calcular!</span>';
                return;
            }

            const mediaAtual = dados.media;
            const somaPesosAtual = dados.somaPesos;
            const notaNecessaria = (7.5 * (somaPesosAtual + peso) - mediaAtual * somaPesosAtual) / peso;
            const notaNecessariaArredondada = Math.ceil(notaNecessaria * 10) / 10;

            if (notaNecessaria <= 0) {
                resultado.innerHTML = `
                    <div style="color:#10b981; padding:0.75rem; background:rgba(16,185,129,0.1); border-radius:10px;">
                        🎉 <strong>Você já está aprovado!</strong>
                        <br>
                        <span style="font-size:0.85rem;">Sua Média dos Exercícios atual (${mediaAtual.toFixed(2)}) já é suficiente para passar sem PF, mesmo se tirar 0 nessa prova.</span>
                    </div>
                `;
            } else if (notaNecessaria > 10) {
                resultado.innerHTML = `
                    <div style="color:#dc2626; padding:0.75rem; background:rgba(220,38,38,0.1); border-radius:10px;">
                        😢 <strong>Infelizmente não é possível passar direto</strong>
                        <br>
                        <span style="font-size:0.85rem;">Você precisaria tirar <strong>${notaNecessariaArredondada.toFixed(1)}</strong> nessa prova, mas a nota máxima é 10.</span>
                        <br>
                        <span style="font-size:0.85rem; color:var(--text-tertiary);">Sua única chance será a Prova Final.</span>
                    </div>
                `;
            } else {
                resultado.innerHTML = `
                    <div style="color:var(--primary-green); padding:0.75rem; background:rgba(105,120,37,0.1); border-radius:10px;">
                        🎯 <strong>Você precisa tirar ${notaNecessariaArredondada.toFixed(1)}</strong> nessa prova
                        <br>
                        <span style="font-size:0.85rem; color:var(--text-tertiary);">
                            Com peso ${peso}, sua Média dos Exercícios atual é <strong>${mediaAtual.toFixed(2)}</strong> e você precisa chegar a 7.5
                        </span>
                    </div>
                `;
            }
        }

        function calcularNotaFaltanteMedia() {
            const mediaAtual = parseFloat(document.getElementById('mediaExercicios').value);
            const peso = parseFloat(document.getElementById('pesoProvaFaltanteMedia').value);
            const resultado = document.getElementById('resultadoNotaFaltanteMedia');

            if (isNaN(mediaAtual) || mediaAtual < 0 || mediaAtual > 10) {
                resultado.innerHTML = '<span style="color:#dc2626;">⚠️ Digite sua Média dos Exercícios primeiro!</span>';
                return;
            }

            if (isNaN(peso) || peso <= 0) {
                resultado.innerHTML = '<span style="color:#dc2626;">⚠️ Digite um peso válido maior que zero!</span>';
                return;
            }

            const notaNecessaria = (7.5 * (1 + peso) - mediaAtual * 1) / peso;
            const notaNecessariaArredondada = Math.ceil(notaNecessaria * 10) / 10;

            if (notaNecessaria <= 0) {
                resultado.innerHTML = `
                    <div style="color:#10b981; padding:0.75rem; background:rgba(16,185,129,0.1); border-radius:10px;">
                        🎉 <strong>Você já está aprovado!</strong>
                        <br>
                        <span style="font-size:0.85rem;">Sua Média dos Exercícios atual (${mediaAtual.toFixed(2)}) já é suficiente para passar sem PF.</span>
                    </div>
                `;
            } else if (notaNecessaria > 10) {
                resultado.innerHTML = `
                    <div style="color:#dc2626; padding:0.75rem; background:rgba(220,38,38,0.1); border-radius:10px;">
                        😢 <strong>Infelizmente não é possível passar direto</strong>
                        <br>
                        <span style="font-size:0.85rem;">Você precisaria tirar <strong>${notaNecessariaArredondada.toFixed(1)}</strong> nessa prova, mas a nota máxima é 10.</span>
                        <br>
                        <span style="font-size:0.85rem; color:var(--text-tertiary);">Sua única chance será a Prova Final.</span>
                    </div>
                `;
            } else {
                resultado.innerHTML = `
                    <div style="color:var(--primary-green); padding:0.75rem; background:rgba(105,120,37,0.1); border-radius:10px;">
                        🎯 <strong>Você precisa tirar ${notaNecessariaArredondada.toFixed(1)}</strong> nessa prova
                        <br>
                        <span style="font-size:0.85rem; color:var(--text-tertiary);">
                            Com peso ${peso}, sua Média dos Exercícios atual é <strong>${mediaAtual.toFixed(2)}</strong> e você precisa chegar a 7.5
                        </span>
                    </div>
                `;
            }
        }

        // ===== RESET =====
        function resetAll() {
            document.querySelectorAll('.nota-input').forEach(i => i.value = '');
            document.querySelectorAll('.peso-input').forEach(i => i.value = '1');
            document.getElementById('mediaExercicios').value = '';
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('resultImage').style.display = 'none';
            document.getElementById('resultadoNotaFaltante').textContent = '';
            document.getElementById('resultadoNotaFaltanteMedia').textContent = '';
            document.getElementById('simuladorPainel').classList.remove('show');
            document.getElementById('simuladorPainelMedia').classList.remove('show');
            document.getElementById('pesoProvaFaltante').value = '1';
            document.getElementById('pesoProvaFaltanteMedia').value = '1';
            
            const entries = document.querySelectorAll('.note-entry');
            entries.forEach((e, i) => {
                if (i > 0) e.remove();
            });
            noteCount = 1;
            const label = document.querySelector('.note-entry .form-group:first-child label');
            if (label) label.textContent = 'Nota 1';
            
            // Reinicia a música de suspense
            stopSuspense();
            setTimeout(playSuspense, 300);
        }

        // ===== INICIAR =====
        document.addEventListener('DOMContentLoaded', function() {
            preloadAudios();
            // Toca a música imediatamente ao carregar a página
            playSuspense();
        });

        // Garantir que a música toque com interação do usuário
        document.addEventListener('click', function() {
            if (audioSuspense && audioSuspense.paused) {
                audioSuspense.play().catch(() => {});
            }
        }, { once: true });
    </script>
</body>
</html>
