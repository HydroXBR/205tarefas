<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Grade Matrícula • MedTasks</title>
  <link rel="icon" type="image/png" href="https://i.ibb.co/nqmZ9nGr/Logo-IG-Med-Ufam116-3x.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f6f8fc;
      --bg-card: #ffffff;
      --bg-elevated: #f1f4f9;
      --border-color: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --primary-green: #2b7a4b;
      --primary-blue: #3b82f6;
      --warning: #f59e0b;
      --danger: #dc2626;
      --purple: #8b5cf6;
      --fm-gold: #b45309;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.04);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      padding-bottom: 2rem;
      line-height: 1.5;
    }

    /* Navbar enxuta */
    .navbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: var(--shadow);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-logo img {
      height: 28px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 1.2rem;
    }

    .med-text {
      color: var(--primary-green);
    }

    .tasks-text {
      color: var(--text-primary);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: 2rem;
      padding: 0.45rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.35rem;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-nav i {
      font-size: 0.85rem;
    }

    .btn-add {
      background: var(--primary-green);
      border-color: var(--primary-green);
      color: white;
    }

    .btn-lembrete {
      background: var(--primary-blue);
      border-color: var(--primary-blue);
      color: white;
    }

    .btn-nav:active {
      transform: scale(0.96);
    }

    .gm-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
    }

    .header-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: 0.5rem 0 1.25rem;
    }

    .header-title h1 {
      font-size: 1.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-badge {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* Grade com linhas por hora */
    .grade-wrapper {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      overflow: hidden;
      margin-bottom: 1.8rem;
    }

    .grade-header {
      padding: 0.9rem 1.2rem;
      background: var(--bg-elevated);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .btn-util {
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      background: white;
    }

    .grade-table-wrap {
      overflow-x: auto;
      padding: 0.25rem;
    }

    .grade-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      min-width: 520px;
    }

    .grade-table th {
      background: var(--bg-elevated);
      padding: 0.5rem 0.2rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: center;
    }

    .grade-table td {
      border-bottom: 1px solid var(--border-color);
      padding: 0.25rem 0.2rem;
      text-align: center;
      height: 36px;
    }

    .hour-cell {
      font-weight: 600;
      color: var(--text-secondary);
      background: #f8fafc;
      width: 80px;
    }

    .slot {
      border-radius: 6px;
      padding: 0.2rem 0.25rem;
      font-size: 0.65rem;
      font-weight: 600;
      display: block;
      margin: 1px;
      white-space: normal;
      word-break: break-word;
    }

    .slot-op1 {
      background: #dbeafe;
      color: #1e40af;
      border-left: 3px solid #3b82f6;
    }

    .slot-op2 {
      background: #fef3c7;
      color: #92400e;
      border-left: 3px solid #f59e0b;
    }

    .slot-conflito {
      background: #fee2e2;
      color: #991b1b;
      border-left: 3px solid #dc2626;
    }

    .disciplinas-container {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .disciplina-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .disciplina-header {
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-elevated);
      cursor: pointer;
    }

    .turma-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.5rem;
      padding: 0.8rem;
    }

    .turma-card {
      background: #f9fafb;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .turma-card.selected-op1 {
      border-color: #3b82f6;
      background: #eff6ff;
    }

    .turma-card.selected-op2 {
      border-color: #f59e0b;
      background: #fffbeb;
    }

    .opção-badge {
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-weight: 700;
    }

    .mobile-op-selector {
      display: flex;
      gap: 0.25rem;
      margin-top: 0.5rem;
    }

    .op-btn {
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 14px;
      border: 1px solid var(--border-color);
      background: white;
      cursor: pointer;
      font-weight: 600;
    }

    .op-btn.active-op1 {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }

    .op-btn.active-op2 {
      background: #f59e0b;
      color: black;
      border-color: #f59e0b;
    }

    @media (max-width: 600px) {
      .turma-grid {
        grid-template-columns: 1fr;
      }
      .nav-actions {
        gap: 0.3rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar simplificada conforme pedido -->
  <nav class="navbar">
    <div class="nav-logo">
      <img src="https://i.ibb.co/5XVmGm7h/marca-ufam-vetor-positivo.png" alt="UFAM">
      <span class="logo-text"><span class="med-text">Med</span><span class="tasks-text">Tasks</span></span>
    </div>
    <div class="nav-actions">
      <a href="/add" class="btn-nav btn-add"><i class="fas fa-plus"></i> Adicionar Tarefa</a>
      <a href="/addlembrete" class="btn-nav btn-lembrete"><i class="fas fa-bell"></i> Lembrete</a>
    </div>
  </nav>

  <div class="gm-container">
    <div class="header-title">
      <h1><i class="fas fa-table"></i> Grade Matrícula</h1>
      <div class="status-badge" id="statusMsg">⏳ Selecione as turmas</div>
    </div>

    <!-- Grade interativa -->
    <div class="grade-wrapper">
      <div class="grade-header">
        <h3 style="font-size:1rem;">📅 Horários</h3>
        <div style="display:flex; gap:0.5rem;">
          <button class="btn-util" onclick="limparTudo()"><i class="fas fa-undo-alt"></i> Limpar</button>
          <button class="btn-util" onclick="window.print()"><i class="fas fa-print"></i> Espelho</button>
        </div>
      </div>
      <div class="grade-table-wrap">
        <table class="grade-table" id="tabelaGrade">
          <thead id="gradeHead"></thead>
          <tbody id="gradeBody"></tbody>
        </table>
      </div>
    </div>

    <h2 style="margin:1rem 0 0.5rem;"><i class="fas fa-book-open"></i> Disciplinas</h2>
    <div class="disciplinas-container" id="disciplinasContainer"></div>
    <div style="margin-top:1rem; font-size:0.7rem; color:var(--text-secondary);">🔵 1ª opção (prioritária) 🟠 2ª opção (fallback)</div>
  </div>

  <script>
    (function() {
      // ----- DADOS REAIS (corrigidos) -----
      const disciplinasData = [
        {
          nome: "Política, planejamento e Gestão em Saúde (PPGS)",
          sigla: "PPGS",
          nomeCurto: "PPGS",
          local: "fm",
          turmas: [
            { numero: 1, vagas: 10, horarios: [{ dia: "Terça", inicio: "13:00", fim: "14:00" }, { dia: "Sexta", inicio: "08:00", fim: "12:00" }] },
            { numero: 2, vagas: 10, horarios: [{ dia: "Terça", inicio: "13:00", fim: "14:00" }, { dia: "Sexta", inicio: "08:00", fim: "12:00" }] },
            { numero: 3, vagas: 10, horarios: [{ dia: "Terça", inicio: "13:00", fim: "14:00" }, { dia: "Sexta", inicio: "08:00", fim: "12:00" }] },
            { numero: 4, vagas: 10, horarios: [{ dia: "Terça", inicio: "14:00", fim: "18:00" }] },
            { numero: 5, vagas: 10, horarios: [{ dia: "Terça", inicio: "14:00", fim: "18:00" }] },
            { numero: 6, vagas: 10, horarios: [{ dia: "Terça", inicio: "14:00", fim: "18:00" }] }
          ]
        },
        {
          nome: "Histologia", sigla: "HIS", nomeCurto: "Histologia", local: "campus",
          turmas: [
            { numero: 1, vagas: 10, horarios: [{ dia: "Segunda", inicio: "10:00", fim: "12:00" }, { dia: "Terça", inicio: "14:00", fim: "16:00" }] },
            { numero: 2, vagas: 10, horarios: [{ dia: "Segunda", inicio: "10:00", fim: "12:00" }, { dia: "Terça", inicio: "14:00", fim: "16:00" }] },
            { numero: 3, vagas: 10, horarios: [{ dia: "Segunda", inicio: "10:00", fim: "12:00" }, { dia: "Terça", inicio: "14:00", fim: "16:00" }] },
            { numero: 4, vagas: 10, horarios: [{ dia: "Segunda", inicio: "10:00", fim: "12:00" }, { dia: "Terça", inicio: "10:00", fim: "12:00" }] },
            { numero: 5, vagas: 10, horarios: [{ dia: "Segunda", inicio: "10:00", fim: "12:00" }, { dia: "Terça", inicio: "10:00", fim: "12:00" }] },
            { numero: 6, vagas: 10, horarios: [{ dia: "Segunda", inicio: "10:00", fim: "12:00" }, { dia: "Terça", inicio: "10:00", fim: "12:00" }] }
          ]
        },
        {
          nome: "Anatomia Humana II", sigla: "AH II", nomeCurto: "Anato II", local: "campus",
          turmas: [
            { numero: 1, vagas: 10, horarios: [{ dia: "Segunda", inicio: "08:00", fim: "10:00" }, { dia: "Terça", inicio: "10:00", fim: "12:00" }, { dia: "Quarta", inicio: "10:00", fim: "12:00" }, { dia: "Quinta", inicio: "10:00", fim: "12:00" }] },
            { numero: 2, vagas: 10, horarios: [{ dia: "Segunda", inicio: "08:00", fim: "10:00" }, { dia: "Terça", inicio: "10:00", fim: "12:00" }, { dia: "Quarta", inicio: "10:00", fim: "12:00" }, { dia: "Quinta", inicio: "10:00", fim: "12:00" }] },
            { numero: 3, vagas: 10, horarios: [{ dia: "Segunda", inicio: "08:00", fim: "10:00" }, { dia: "Terça", inicio: "10:00", fim: "12:00" }, { dia: "Quarta", inicio: "10:00", fim: "12:00" }, { dia: "Quinta", inicio: "10:00", fim: "12:00" }] },
            { numero: 4, vagas: 10, horarios: [{ dia: "Segunda", inicio: "08:00", fim: "10:00" }, { dia: "Terça", inicio: "08:00", fim: "10:00" }, { dia: "Quarta", inicio: "10:00", fim: "12:00" }, { dia: "Quinta", inicio: "08:00", fim: "10:00" }] },
            { numero: 5, vagas: 10, horarios: [{ dia: "Segunda", inicio: "08:00", fim: "10:00" }, { dia: "Terça", inicio: "08:00", fim: "10:00" }, { dia: "Quarta", inicio: "10:00", fim: "12:00" }, { dia: "Quinta", inicio: "08:00", fim: "10:00" }] },
            { numero: 6, vagas: 10, horarios: [{ dia: "Segunda", inicio: "08:00", fim: "10:00" }, { dia: "Terça", inicio: "08:00", fim: "10:00" }, { dia: "Quarta", inicio: "10:00", fim: "12:00" }, { dia: "Quinta", inicio: "08:00", fim: "10:00" }] }
          ]
        },
        {
          nome: "Genética", sigla: "GEN", nomeCurto: "Genética", local: "campus",
          turmas: [
            { numero: 1, vagas: 20, horarios: [{ dia: "Segunda", inicio: "16:00", fim: "18:00" }, { dia: "Quinta", inicio: "08:00", fim: "10:00" }] },
            { numero: 3, vagas: 20, horarios: [{ dia: "Segunda", inicio: "16:00", fim: "18:00" }, { dia: "Quinta", inicio: "14:00", fim: "16:00" }] },
            { numero: 6, vagas: 20, horarios: [{ dia: "Segunda", inicio: "16:00", fim: "18:00" }, { dia: "Quinta", inicio: "10:00", fim: "12:00" }] }
          ]
        },
        {
          nome: "Bioquímica Celular e Metabólica", sigla: "BIOQ", nomeCurto: "Bioquímica", local: "campus",
          turmas: [
            { numero: 1, vagas: 10, horarios: [{ dia: "Segunda", inicio: "14:00", fim: "16:00" }, { dia: "Quarta", inicio: "14:00", fim: "16:00" }, { dia: "Sexta", inicio: "16:00", fim: "18:00" }] },
            { numero: 2, vagas: 10, horarios: [{ dia: "Segunda", inicio: "14:00", fim: "16:00" }, { dia: "Quarta", inicio: "14:00", fim: "16:00" }, { dia: "Sexta", inicio: "16:00", fim: "18:00" }] },
            { numero: 3, vagas: 10, horarios: [{ dia: "Segunda", inicio: "14:00", fim: "16:00" }, { dia: "Quarta", inicio: "16:00", fim: "18:00" }, { dia: "Sexta", inicio: "16:00", fim: "18:00" }] },
            { numero: 4, vagas: 10, horarios: [{ dia: "Segunda", inicio: "14:00", fim: "16:00" }, { dia: "Quarta", inicio: "16:00", fim: "18:00" }, { dia: "Sexta", inicio: "16:00", fim: "18:00" }] },
            { numero: 5, vagas: 10, horarios: [{ dia: "Segunda", inicio: "14:00", fim: "16:00" }, { dia: "Sexta", inicio: "16:00", fim: "18:00" }, { dia: "Sexta", inicio: "14:00", fim: "16:00" }] },
            { numero: 6, vagas: 10, horarios: [{ dia: "Segunda", inicio: "14:00", fim: "16:00" }, { dia: "Sexta", inicio: "16:00", fim: "18:00" }, { dia: "Sexta", inicio: "14:00", fim: "16:00" }] }
          ]
        },
        {
          nome: "Fundamentos do Ensino da Dor", sigla: "DOR", nomeCurto: "Dor", local: "optativa",
          turmas: [{ numero: 1, vagas: 40, horarios: [{ dia: "Terça", inicio: "18:00", fim: "20:00" }, { dia: "Quinta", inicio: "18:00", fim: "19:00" }] }]
        },
        {
          nome: "Fundamentos de Bioética", sigla: "BIOET", nomeCurto: "Bioética", local: "optativa",
          turmas: [{ numero: 1, vagas: 30, horarios: [{ dia: "Quarta", inicio: "14:00", fim: "16:00" }, { dia: "Quinta", inicio: "07:00", fim: "09:00" }] }]
        },
        {
          nome: "Psicossomática", sigla: "PSICO", nomeCurto: "Psicossomática", local: "optativa",
          turmas: [{ numero: 1, vagas: 40, horarios: [{ dia: "Quarta", inicio: "11:00", fim: "13:00" }, { dia: "Sexta", inicio: "08:00", fim: "10:00" }] }]
        }
      ];

      // Horários contínuos das 07h às 20h (linha por hora)
      const horasGrade = [];
      for (let h = 7; h <= 20; h++) {
        const inicio = `${String(h).padStart(2,'0')}:00`;
        const fim = `${String(h+1).padStart(2,'0')}:00`;
        horasGrade.push(`${inicio}-${fim}`);
      }

      const diasSemana = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'];

      // Estado: op1 = primeira opção, op2 = fallback
      let selecoes = {
        op1: {}, // { nomeDisciplina: numeroTurma }
        op2: {}
      };

      // Elementos DOM
      const gradeHead = document.getElementById('gradeHead');
      const gradeBody = document.getElementById('gradeBody');
      const containerDisc = document.getElementById('disciplinasContainer');
      const statusMsg = document.getElementById('statusMsg');

      // Função para saber se dois intervalos de tempo se sobrepõem
      function horariosColidem(inicio1, fim1, inicio2, fim2) {
        return inicio1 < fim2 && inicio2 < fim1;
      }

      // Converte "HH:MM" para minutos desde meia-noite
      function paraMinutos(hhmm) {
        const [h, m] = hhmm.split(':').map(Number);
        return h * 60 + m;
      }

      // Detecta conflito apenas entre disciplinas DIFERENTES
      function existeConflitoEntreDisciplinasDiferentes(horariosSet, novaDiscNome) {
        const novaChaves = Object.keys(horariosSet).filter(k => k.startsWith(novaDiscNome + '|'));
        for (let [key, infos] of Object.entries(horariosSet)) {
          const [discNome] = key.split('|');
          if (discNome === novaDiscNome) continue; // mesma disciplina não conta como conflito
          for (let novaChave of novaChaves) {
            const [_, diaN, inicioN, fimN] = novaChave.split('|');
            const [__, diaE, inicioE, fimE] = key.split('|');
            if (diaN === diaE && horariosColidem(inicioN, fimN, inicioE, fimE)) {
              return true; // conflito com disciplina diferente
            }
          }
        }
        return false;
      }

      // Constroi mapa de horários para todas as seleções ativas
      function construirMapaHorarios() {
        const mapa = {}; // chave: "discNome|dia|inicio|fim" -> { tipo: 'op1'/'op2', disciplina, turma }
        Object.entries(selecoes.op1).forEach(([discNome, turmaNum]) => {
          const disc = disciplinasData.find(d => d.nome === discNome);
          if (!disc) return;
          const turma = disc.turmas.find(t => t.numero === turmaNum);
          if (!turma) return;
          turma.horarios.forEach(h => {
            const key = `${discNome}|${h.dia}|${h.inicio}|${h.fim}`;
            mapa[key] = { tipo: 'op1', disciplina: disc.nomeCurto, turma: turmaNum, nomeCompleto: disc.nome };
          });
        });
        Object.entries(selecoes.op2).forEach(([discNome, turmaNum]) => {
          const disc = disciplinasData.find(d => d.nome === discNome);
          if (!disc) return;
          const turma = disc.turmas.find(t => t.numero === turmaNum);
          if (!turma) return;
          turma.horarios.forEach(h => {
            const key = `${discNome}|${h.dia}|${h.inicio}|${h.fim}`;
            if (!mapa[key]) {
              mapa[key] = { tipo: 'op2', disciplina: disc.nomeCurto, turma: turmaNum, nomeCompleto: disc.nome };
            }
          });
        });
        return mapa;
      }

      function atualizarGrade() {
        const mapaHorarios = construirMapaHorarios();
        // Cabeçalho
        gradeHead.innerHTML = `<tr><th>Horário</th>${diasSemana.map(d => `<th>${d}</th>`).join('')}</tr>`;
        
        let html = '';
        horasGrade.forEach(faixa => {
          const [inicioFaixa, fimFaixa] = faixa.split('-');
          html += `<tr><td class="hour-cell">${faixa}</td>`;
          
          diasSemana.forEach(dia => {
            let celulaConteudo = '';
            const slots = [];
            
            Object.entries(mapaHorarios).forEach(([key, info]) => {
              const [discNome, hDia, hInicio, hFim] = key.split('|');
              if (hDia !== dia) return;
              const iniMin = paraMinutos(hInicio);
              const fimMin = paraMinutos(hFim);
              const faixaIni = paraMinutos(inicioFaixa);
              const faixaFim = paraMinutos(fimFaixa);
              
              if (horariosColidem(faixaIni, faixaFim, iniMin, fimMin)) {
                slots.push(info);
              }
            });

            if (slots.length === 0) {
              celulaConteudo = '<span style="color:#cbd5e1;">-</span>';
            } else {
              const op1Slots = slots.filter(s => s.tipo === 'op1');
              const op2Slots = slots.filter(s => s.tipo === 'op2');
              
              if (op1Slots.length && op2Slots.length) {
                celulaConteudo = `<span class="slot slot-conflito">⚠️ ${op1Slots[0].disciplina} / ${op2Slots[0].disciplina}</span>`;
              } else if (op1Slots.length) {
                celulaConteudo = `<span class="slot slot-op1">${op1Slots[0].disciplina} (T${op1Slots[0].turma})</span>`;
              } else if (op2Slots.length) {
                celulaConteudo = `<span class="slot slot-op2">${op2Slots[0].disciplina} (T${op2Slots[0].turma})</span>`;
              }
            }
            html += `<td>${celulaConteudo}</td>`;
          });
          html += '</tr>';
        });
        gradeBody.innerHTML = html;
      }

      function selecionarTurma(discNome, turmaNum, tipo) {
        const key = discNome;
        if (tipo === 'op1') {
          if (selecoes.op1[key] === turmaNum) {
            delete selecoes.op1[key];
          } else {
            selecoes.op1[key] = turmaNum;
            // Se mesma turma está na op2, remove da op2
            if (selecoes.op2[key] === turmaNum) delete selecoes.op2[key];
          }
        } else if (tipo === 'op2') {
          if (selecoes.op2[key] === turmaNum) {
            delete selecoes.op2[key];
          } else {
            // Não permite op2 igual à op1
            if (selecoes.op1[key] === turmaNum) {
              alert('Esta turma já é sua 1ª opção.');
              return;
            }
            selecoes.op2[key] = turmaNum;
          }
        }
        renderizarDisciplinas();
        atualizarGrade();
        atualizarStatus();
      }

      function removerSelecao(discNome, tipo) {
        if (tipo === 'op1') delete selecoes.op1[discNome];
        else delete selecoes.op2[discNome];
        renderizarDisciplinas();
        atualizarGrade();
        atualizarStatus();
      }

      function renderizarDisciplinas() {
        containerDisc.innerHTML = disciplinasData.map((disc, idx) => {
          const op1Selecionada = selecoes.op1[disc.nome] || null;
          const op2Selecionada = selecoes.op2[disc.nome] || null;
          return `
            <div class="disciplina-card">
              <div class="disciplina-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('i').classList.toggle('fa-chevron-down'); this.querySelector('i').classList.toggle('fa-chevron-up')">
                <strong>${disc.nome}</strong>
                <div style="display:flex; gap:0.5rem; align-items:center;">
                  ${op1Selecionada ? `<span class="opção-badge" style="background:#3b82f6;color:white;">1ª T${op1Selecionada}</span>` : ''}
                  ${op2Selecionada ? `<span class="opção-badge" style="background:#f59e0b;color:black;">2ª T${op2Selecionada}</span>` : ''}
                  <i class="fas fa-chevron-down"></i>
                </div>
              </div>
              <div class="turma-grid" style="display:none;">
                ${disc.turmas.map(t => {
                  const isOp1 = op1Selecionada === t.numero;
                  const isOp2 = op2Selecionada === t.numero;
                  return `
                    <div class="turma-card ${isOp1 ? 'selected-op1' : ''} ${isOp2 ? 'selected-op2' : ''}">
                      <div><strong>Turma ${t.numero}</strong> <span style="font-size:0.7rem;">(${t.vagas} vagas)</span></div>
                      <div style="font-size:0.7rem;">${t.horarios.map(h => `${h.dia} ${h.inicio}-${h.fim}`).join(' · ')}</div>
                      <div class="mobile-op-selector">
                        <button class="op-btn ${isOp1 ? 'active-op1' : ''}" onclick="event.stopPropagation(); selecionarTurma('${disc.nome}', ${t.numero}, 'op1')">1ª Opção</button>
                        <button class="op-btn ${isOp2 ? 'active-op2' : ''}" onclick="event.stopPropagation(); selecionarTurma('${disc.nome}', ${t.numero}, 'op2')">2ª Opção</button>
                        ${(isOp1 || isOp2) ? `<button class="op-btn" style="background:#eee;" onclick="event.stopPropagation(); removerSelecao('${disc.nome}', '${isOp1 ? 'op1' : 'op2'}')">✕</button>` : ''}
                      </div>
                    </div>`;
                }).join('')}
              </div>
            </div>
          `;
        }).join('');
      }

      function atualizarStatus() {
        const total1 = Object.keys(selecoes.op1).length;
        const total2 = Object.keys(selecoes.op2).length;
        statusMsg.innerHTML = total1 || total2 ? `✅ 1ª: ${total1} | 2ª: ${total2}` : '⏳ Nenhuma turma';
      }

      window.limparTudo = function() {
        selecoes = { op1: {}, op2: {} };
        renderizarDisciplinas();
        atualizarGrade();
        atualizarStatus();
      };

      // Torna funções acessíveis globalmente
      window.selecionarTurma = selecionarTurma;
      window.removerSelecao = removerSelecao;

      // Inicialização
      renderizarDisciplinas();
      atualizarGrade();
      atualizarStatus();
    })();
  </script>
</body>
</html>
